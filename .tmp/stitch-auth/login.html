<style>
        body {
            background-color: #F7F2E9; /* Warm Canvas */
            color: #1c1b1b;
        }

<body class="font-body-md text-body-md antialiased min-h-screen flex flex-col">
<!-- Top Navigation Bar (Specialized for Login) -->
<nav class="fixed top-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-7xl h-14 bg-paper-surface/90 backdrop-blur-md rounded-lg border border-warm-border flex justify-between items-center px-6 z-50">
<div class="flex items-center gap-4">
<a class="flex items-center gap-2 text-muted-clay hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[20px] transition-transform group-active:-translate-x-1" data-icon="arrow_back">arrow_back</span>
<span class="font-body-md">Quay lại</span>
</a>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<span class="font-display-md text-headline-sm font-bold tracking-tighter text-primary uppercase">TECH_SPEC</span>
</div>
<div class="w-24"></div> <!-- Spacer for symmetry -->
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4">
<div class="w-full max-w-md">
<!-- Login Container (Bento style card) -->
<div class="login-card double-bezel p-8 md:p-12 rounded-[2rem] relative overflow-hidden transition-all duration-500">
<!-- Atmospheric background element -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-brass-surface/20 rounded-full blur-3xl"></div>
<!-- Header Section -->
<header class="mb-10 text-center md:text-left">
<h1 class="font-display-md text-headline-lg text-primary mb-2">Chào mừng trở lại</h1>
<p class="text-muted-clay font-body-md">Vui lòng nhập thông tin để truy cập TECH_SPEC.</p>
</header>
<!-- Login Form -->
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-label-mono text-muted-clay uppercase tracking-wider block ml-1" for="email">Email</label>
<input class="w-full bg-milk-surface border-warm-border border rounded-xl h-14 px-5 font-body-md placeholder:text-outline-variant focus:border-secondary focus:ring-0 transition-all duration-200 outline-none" id="email" placeholder="ten@vi-du.vn" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="font-label-mono text-muted-clay uppercase tracking-wider block" for="password">Mật khẩu</label>
<a class="font-body-md text-secondary hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<input class="w-full bg-milk-surface border-warm-border border rounded-xl h-14 px-5 font-body-md placeholder:text-outline-variant focus:border-secondary focus:ring-0 transition-all duration-200 outline-none" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-muted-clay hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-body-lg font-bold flex items-center justify-center gap-2 active:scale-95 transition-all duration-200 hover:bg-zinc-800 shadow-sm mt-8" type="submit">
<span>Đăng nhập</span>
<span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-warm-border"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="bg-paper-surface px-4 text-muted-clay font-label-mono uppercase">Hoặc đăng nhập bằng</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="h-14 border border-warm-border rounded-xl flex items-center justify-center gap-2 bg-milk-surface hover:bg-paper-surface transition-all active:scale-95">

</svg>
<span class="font-body-md font-medium">Google</span>
</button>
<button class="h-14 border border-warm-border rounded-xl flex items-center justify-center gap-2 bg-milk-surface hover:bg-paper-surface transition-all active:scale-95">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path>
</svg>
<span class="font-body-md font-medium">GitHub</span>
</button>

<div class="mt-12 text-center">
<p class="text-muted-clay">
                        Chưa có tài khoản?

<div class="mt-8 flex justify-center gap-6 text-muted-clay font-label-mono text-[11px] uppercase tracking-widest opacity-60">
<a class="hover:text-primary transition-colors" href="#">Bảo mật</a>
<a class="hover:text-primary transition-colors" href="#">Điều khoản</a>
<a class="hover:text-primary transition-colors" href="#">Hỗ trợ</a>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Subtle parallax effect on the atmospheric blur
        document.addEventListener('mousemove', (e) => {
            const blur = document.querySelector('.blur-3xl');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            blur.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
        });
    </script>
</body></html>
