<!-- Email -->

<label class="font-label-mono text-label-mono text-on-surface-variant px-1" for="email">EMAIL</label>
<input class="w-full h-14 px-6 bg-milk-surface border border-warm-border rounded-xl font-body-md text-body-md focus:ring-0 focus:border-secondary transition-all outline-none" id="email" name="email" placeholder="example@techspec.vn" required="" type="email">
</div>
<!-- Phone -->
<div class="space-y-2">
<label class="font-label-mono text-label-mono text-on-surface-variant px-1" for="phone">SỐ ĐIỆN THOẠI</label>
<input class="w-full h-14 px-6 bg-milk-surface border border-warm-border rounded-xl font-body-md text-body-md focus:ring-0 focus:border-secondary transition-all outline-none" id="phone" name="phone" placeholder="09xx xxx xxx" required="" type="tel">
</div>
<!-- Date of Birth -->

<label class="font-label-mono text-label-mono text-on-surface-variant px-1" for="dob">NGÀY SINH</label>

</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label-mono text-label-mono text-on-surface-variant px-1" for="password">MẬT KHẨU</label>
<input class="w-full h-14 px-6 bg-milk-surface border border-warm-border rounded-xl font-body-md text-body-md focus:ring-0 focus:border-secondary transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>

<!-- Featured Products Teaser (Optional Editorial touch) -->
</main>
<!-- Footer -->
<script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Basic animation feedback
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'Đang xử lý...';
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            setTimeout(() => {
                alert('Yêu cầu đăng ký đã được gửi! Cảm ơn bạn đã gia nhập TECH_SPEC.');
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }, 1500);
        });

        // Hover effect for input containers
        const inputs = document.querySelectorAll('input:not([type="checkbox"])');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
